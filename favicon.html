<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link id="favicon-link" rel="icon" type="image/svg+xml" href="favicons/grey.svg">
  <title> </title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #fafafa;
    }
    .box { text-align: center; }
    .pill {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 10px 22px 10px 14px;
      border: 2px dashed #ccc;
      border-radius: 30px;
      background: #fff;
      cursor: grab;
      user-select: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .pill:hover { border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .pill:active { cursor: grabbing; }
    .pill img { width: 36px; height: 36px; }
    .pill span { font-size: 14px; color: #888; }
    .hint { margin-top: 16px; font-size: 13px; color: #bbb; }
  </style>
</head>
<body>
  <div class="box">
    <div class="pill" id="draggable" draggable="true">
      <img id="preview" src="favicons/grey.svg" alt="">
      <span id="label">Grey</span>
    </div>
    <p class="hint">⬆ Drag this pill or the tab to your bookmarks bar</p>
    <p style="margin-top: 28px;"><a href="./" style="color: #bbb; font-size: 13px; text-decoration: none;">← Back to gallery</a></p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var name = params.get('name');
    if (name) {
      var label = name.charAt(0).toUpperCase() + name.slice(1);
      var pageUrl = location.origin + location.pathname + '?name=' + name;
      document.getElementById('favicon-link').href = 'favicons/' + name + '.svg';
      document.getElementById('preview').src = 'favicons/' + name + '.svg';
      document.getElementById('label').textContent = label;
      document.title = ' ';
      document.getElementById('draggable').addEventListener('dragstart', function(e) {
        e.dataTransfer.setData('text/uri-list', pageUrl);
        e.dataTransfer.setData('text/plain', pageUrl);
      });
    }
  </script>
</body>
</html>
